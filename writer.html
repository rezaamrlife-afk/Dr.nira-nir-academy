<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. NIRA — Academic Writer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B2A4A; --navy-dark: #0F1B33; --blue: #2563EB;
    --blue-light: #60A5FA; --blue-pale: #EEF4FF;
    --muted: #a0b0cc; --text-dark: #1B2A4A; --text-mid: #6B7FA3;
    --border: #dde6f5; --sidebar-w: 240px;
  }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: #f0f4ff; color: var(--text-dark); }
  .app-shell { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--navy-dark); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
  .sidebar-logo-icon { width: 32px; height: 32px; background: var(--blue); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .sidebar-logo-icon svg { width: 17px; height: 17px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .sidebar-logo-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: #fff; }
  .sidebar-section { padding: 20px 12px 8px; }
  .sidebar-section-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px; text-decoration: none; }
  .nav-item:hover { background: rgba(255,255,255,0.06); }
  .nav-item.active { background: var(--blue); }
  .nav-item svg { width: 17px; height: 17px; fill: none; stroke: var(--muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .nav-item.active svg, .nav-item:hover svg { stroke: #fff; }
  .nav-item span { font-size: 13px; color: var(--muted); }
  .nav-item.active span, .nav-item:hover span { color: #fff; }
  .nav-item .nav-badge { margin-left: auto; background: var(--blue-light); color: var(--navy-dark); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
  .sidebar-bottom { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .user-name { font-size: 12px; font-weight: 500; color: #fff; }
  .user-role { font-size: 11px; color: var(--muted); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* TOPBAR */
  .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 16px; }
  .topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .doc-title-input { border: none; outline: none; font-size: 15px; font-weight: 600; color: var(--text-dark); font-family: 'Inter', sans-serif; background: transparent; flex: 1; min-width: 0; }
  .doc-title-input::placeholder { color: var(--muted); }
  .autosave-indicator { font-size: 11px; color: var(--text-mid); display: flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0; }
  .autosave-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .autosave-dot.saving { background: var(--blue-light); animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .topbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-sm { background: var(--blue); color: #fff; border: none; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 5px; transition: background 0.2s; }
  .btn-sm:hover { background: #1d4ed8; }
  .btn-sm-outline { background: transparent; color: var(--text-dark); border: 1px solid var(--border); padding: 7px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .btn-sm-outline:hover { background: var(--blue-pale); }

  /* EDITOR AREA */
  .editor-area { flex: 1; overflow-y: auto; background: #f0f4ff; display: flex; flex-direction: column; align-items: center; padding: 32px 24px 80px; }

  /* QUILL TOOLBAR OVERRIDE */
  .ql-toolbar.ql-snow {
    width: 100%;
    max-width: 820px;
    background: #fff;
    border: 1px solid var(--border) !important;
    border-radius: 10px 10px 0 0 !important;
    padding: 8px 12px !important;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .ql-toolbar.ql-snow .ql-formats { margin-right: 8px; }

  .ql-toolbar.ql-snow button,
  .ql-toolbar.ql-snow .ql-picker-label {
    border-radius: 5px !important;
    transition: background 0.15s !important;
  }

  .ql-toolbar.ql-snow button:hover,
  .ql-toolbar.ql-snow .ql-picker-label:hover {
    background: var(--blue-pale) !important;
    color: var(--blue) !important;
  }

  .ql-toolbar.ql-snow button.ql-active,
  .ql-toolbar.ql-snow .ql-picker-label.ql-active {
    background: var(--blue-pale) !important;
    color: var(--blue) !important;
  }

  .extra-toolbar {
    width: 100%;
    max-width: 820px;
    background: #fff;
    border: 1px solid var(--border);
    border-top: none;
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .extra-btn {
    width: 28px; height: 24px; border: none; background: transparent;
    cursor: pointer; border-radius: 5px; display: inline-flex;
    align-items: center; justify-content: center; transition: background 0.15s;
  }
  .extra-btn:hover { background: var(--blue-pale); }
  .extra-btn svg { width: 15px; height: 15px; stroke: var(--text-mid); fill: none; stroke-width: 1.5; }
  .extra-btn:hover svg { stroke: var(--blue); }
  .ql-toolbar.ql-snow button:hover .ql-stroke,
  .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: var(--blue) !important; }
  .ql-toolbar.ql-snow .ql-fill { fill: var(--text-mid) !important; }
  .ql-toolbar.ql-snow button:hover .ql-fill,
  .ql-toolbar.ql-snow button.ql-active .ql-fill { fill: var(--blue) !important; }

  /* WRITING CARD */
  #editor-container {
    width: 100%;
    max-width: 820px;
    background: #fff;
    border: 1px solid var(--border) !important;
    border-top: none !important;
    border-radius: 0 0 10px 10px !important;
    box-shadow: 0 4px 24px rgba(27,42,74,0.08);
    min-height: 600px;
  }

  .ql-container.ql-snow {
    border: none !important;
    font-family: 'Lora', Georgia, serif !important;
    font-size: 16px !important;
    line-height: 1.85 !important;
    color: #1a1a2e !important;
  }

  .ql-editor {
    padding: 48px 56px !important;
    min-height: 600px !important;
    caret-color: var(--blue) !important;
  }

  .ql-editor.ql-blank::before {
    font-style: italic !important;
    color: #b0bec5 !important;
    font-family: 'Lora', Georgia, serif !important;
    font-size: 16px !important;
    left: 56px !important;
  }

  .ql-editor h1 { font-family: 'Playfair Display', serif !important; font-size: 28px !important; font-weight: 700 !important; color: var(--navy-dark) !important; margin-bottom: 12px !important; line-height: 1.3 !important; }
  .ql-editor h2 { font-family: 'Playfair Display', serif !important; font-size: 22px !important; font-weight: 700 !important; color: var(--navy-dark) !important; margin-bottom: 10px !important; }
  .ql-editor h3 { font-family: 'Inter', sans-serif !important; font-size: 17px !important; font-weight: 600 !important; color: var(--navy) !important; margin-bottom: 8px !important; }
  .ql-editor p { margin-bottom: 12px !important; }
  .ql-editor blockquote { border-left: 3px solid var(--blue-light) !important; padding-left: 16px !important; color: var(--text-mid) !important; font-style: italic !important; margin: 16px 0 !important; }
  .ql-editor a { color: var(--blue) !important; }
  .ql-editor ul, .ql-editor ol { padding-left: 24px !important; }

  /* STATS BAR */
  .stats-bar {
    width: 100%;
    max-width: 820px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 0;
    flex-wrap: wrap;
    gap: 8px;
  }

  .stats-group { display: flex; align-items: center; gap: 16px; }
  .stat-item { font-size: 11px; color: var(--text-mid); }
  .stat-item strong { color: var(--text-dark); font-weight: 600; }

  /* DOCS LIST */
  .docs-sidebar { width: 220px; background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .docs-sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .docs-sidebar-header h4 { font-size: 12px; font-weight: 600; color: var(--text-dark); }
  .btn-new-doc { background: var(--blue); color: #fff; border: none; width: 22px; height: 22px; border-radius: 5px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .docs-list { flex: 1; overflow-y: auto; padding: 8px; }
  .doc-item { padding: 10px 10px; border-radius: 7px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px; }
  .doc-item:hover { background: #f8faff; }
  .doc-item.active { background: var(--blue-pale); }
  .doc-item-title { font-size: 12px; font-weight: 500; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .doc-item.active .doc-item-title { color: var(--blue); }
  .doc-item-meta { font-size: 10px; color: var(--text-mid); }
  .doc-item-actions { display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity 0.15s; }
  .doc-item:hover .doc-item-actions { opacity: 1; }
  .doc-action-btn { font-size: 10px; padding: 2px 7px; border: 1px solid var(--border); border-radius: 4px; background: #fff; color: var(--text-mid); cursor: pointer; font-family: 'Inter', sans-serif; }
  .doc-action-btn:hover { color: var(--blue); border-color: var(--blue-light); }
  .doc-action-btn.danger:hover { color: #dc2626; border-color: #fecaca; }
  .docs-empty { padding: 24px 16px; text-align: center; color: var(--text-mid); font-size: 12px; line-height: 1.6; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .docs-sidebar { display: none; }
    .ql-editor { padding: 28px 20px !important; }
  }
  /* MOBILE BOTTOM NAV */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--navy-dark);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .mobile-nav-items { display: flex; justify-content: space-around; align-items: center; }
  .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; text-decoration: none; padding: 4px 8px; border-radius: 8px; min-width: 56px; }
  .mobile-nav-item svg { width: 20px; height: 20px; fill: none; stroke: var(--muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .mobile-nav-item span { font-size: 9px; color: var(--muted); font-weight: 500; }
  .mobile-nav-item.active svg { stroke: var(--blue-light); }
  .mobile-nav-item.active span { color: var(--blue-light); }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .mobile-nav { display: block; }
    .content { padding: 16px; padding-bottom: 80px; }
    .topbar { padding: 0 16px; }
  }
</style>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="sidebar-logo-name">Dr. NIRA</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <a class="nav-item" href="app.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a class="nav-item" href="profile.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>My profile</span></a>
      <a class="nav-item" href="proposals.html"><svg viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg><span>My proposals</span></a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Research</div>
      <a class="nav-item" href="topic.html"><svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg><span>Topic generator</span><span class="nav-badge">New</span></a>
      <a class="nav-item" href="proposal.html"><svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span>Proposal builder</span></a>
      <a class="nav-item" href="upload.html"><svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg><span>Upload & analyze</span></a>
    </div>
    <div class="sidebar-section">

      <a class="nav-item" href="citations.html"><svg viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span>Citations</span></a>
      <a class="nav-item" href="export.html"><svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg><span>Export</span></a>
    </div>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar" id="sidebarAvatar">DR</div>
        <div><div class="user-name" id="sidebarName">Dr. Researcher</div><div class="user-role" id="sidebarRole">PhD Candidate</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <input class="doc-title-input" type="text" id="docTitle" placeholder="Untitled document..." maxlength="100">
        <div class="autosave-indicator">
          <div class="autosave-dot" id="autosaveDot"></div>
          <span id="autosaveLabel">Saved</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn-sm-outline" onclick="window.location.href='app.html'">← Dashboard</button>
        <button class="btn-sm-outline" onclick="exportTXT()">Export TXT</button>

          <svg style="width:12px;height:12px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>

            <button class="ql-list" value="ordered" title="Numbered list"></button>

            <button class="ql-align" value="" title="Left"></button>
            <button class="ql-align" value="center" title="Center"></button>
            <button class="ql-align" value="right" title="Right"></button>
          </span>
          <span class="ql-formats">

      <!-- DOCS SIDEBAR -->

        <div class="docs-sidebar-header">
          <h4>My documents</h4>
          <button class="btn-new-doc" onclick="newDocument()" title="New document">+</button>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script>
  // Init Quill
  const quill = new Quill('#editor', {
    theme: 'snow',
    modules: {
      toolbar: '#toolbar',
      history: { delay: 1000, maxStack: 100, userOnly: true }
    },
    placeholder: 'Start writing your academic document here...'
  });

  // Add undo/redo buttons outside toolbar
  document.getElementById('extraToolbar').innerHTML = `
    <button class="extra-btn" title="Undo" onclick="quill.history.undo()">
      <svg viewBox="0 0 18 18"><polygon points="6 10 4 12 2 10"/><path d="M8.77,5.3A4.45,4.45,0,0,1,12.76,7a4.5,4.5,0,0,1,0,9H7.29"/><line x1="4" y1="12" x2="4" y2="8"/></svg>
    </button>
    <button class="extra-btn" title="Redo" onclick="quill.history.redo()">
      <svg viewBox="0 0 18 18"><polygon points="12 10 14 12 16 10"/><path d="M9.23,5.3A4.45,4.45,0,0,0,5.24,7a4.5,4.5,0,0,0,0,9h5.47"/><line x1="14" y1="12" x2="14" y2="8"/></svg>
    </button>
  `;

  let currentDocId = null;
  let docs = JSON.parse(localStorage.getItem('nira_writer_docs') || '[]');
  let autoSaveTimer = null;

  // Load profile
  window.addEventListener('load', function() {
    const sp = localStorage.getItem('nira_profile');
    if (sp) {
      const p = JSON.parse(sp);
      document.getElementById('sidebarName').textContent = p.fullName || 'Dr. Researcher';
      document.getElementById('sidebarRole').textContent = (p.degree || 'PhD') + ' Candidate';
      if (p.fullName) document.getElementById('sidebarAvatar').textContent = p.fullName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    }

    renderDocsList();

    // Load last active doc
    const lastId = localStorage.getItem('nira_writer_active');
    if (lastId) {
      const doc = docs.find(d => d.id == lastId);
      if (doc) loadDoc(doc.id);
      else if (docs.length > 0) loadDoc(docs[0].id);
      else newDocument();
    } else if (docs.length > 0) {
      loadDoc(docs[0].id);
    } else {
      newDocument();
    }
  });

  // Text change handler
  quill.on('text-change', function() {
    updateStats();
    triggerAutoSave();
  });

  function updateStats() {
    const text = quill.getText().trim();
    const words = text ? text.split(/\s+/).filter(w => w.length > 0).length : 0;
    const chars = text.length;
    const sentences = text ? (text.match(/[.!?]+/g) || []).length : 0;
    const readTime = Math.max(1, Math.ceil(words / 200));
    document.getElementById('wordCount').textContent = words.toLocaleString();
    document.getElementById('charCount').textContent = chars.toLocaleString();
    document.getElementById('sentCount').textContent = sentences;
    document.getElementById('readTime').textContent = readTime + ' min';
  }

  function triggerAutoSave() {
    const dot = document.getElementById('autosaveDot');
    const label = document.getElementById('autosaveLabel');
    dot.classList.add('saving');
    label.textContent = 'Saving...';
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      saveCurrentDoc();
      dot.classList.remove('saving');
      label.textContent = 'Saved';
      const now = new Date();
      document.getElementById('lastSaved').textContent = 'Last saved ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }, 1200);
  }

  function saveCurrentDoc() {
    if (!currentDocId) return;
    const idx = docs.findIndex(d => d.id === currentDocId);
    if (idx === -1) return;
    docs[idx].content = quill.getContents();
    docs[idx].title = document.getElementById('docTitle').value || 'Untitled';
    docs[idx].updatedAt = new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
    docs[idx].wordCount = quill.getText().trim().split(/\s+/).filter(w=>w.length>0).length;
    localStorage.setItem('nira_writer_docs', JSON.stringify(docs));
    renderDocsList();
  }

  function newDocument() {
    saveCurrentDoc();
    const doc = {
      id: Date.now(),
      title: 'Untitled',
      content: null,
      createdAt: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}),
      updatedAt: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}),
      wordCount: 0
    };
    docs.unshift(doc);
    localStorage.setItem('nira_writer_docs', JSON.stringify(docs));
    loadDoc(doc.id);
    renderDocsList();
    setTimeout(() => { document.getElementById('docTitle').focus(); document.getElementById('docTitle').select(); }, 100);
  }

  function loadDoc(id) {
    saveCurrentDoc();
    const doc = docs.find(d => d.id === id);
    if (!doc) return;
    currentDocId = id;
    localStorage.setItem('nira_writer_active', id);
    document.getElementById('docTitle').value = doc.title || 'Untitled';
    if (doc.content) {
      quill.setContents(doc.content);
    } else {
      quill.setText('');
    }
    updateStats();
    renderDocsList();
  }

  function deleteDoc(id) {
    if (!confirm('Delete this document?')) return;
    docs = docs.filter(d => d.id !== id);
    localStorage.setItem('nira_writer_docs', JSON.stringify(docs));
    if (currentDocId === id) {
      currentDocId = null;
      if (docs.length > 0) loadDoc(docs[0].id);
      else newDocument();
    }
    renderDocsList();
  }

  function duplicateDoc(id) {
    const doc = docs.find(d => d.id === id);
    if (!doc) return;
    const copy = { ...doc, id: Date.now(), title: doc.title + ' (copy)', createdAt: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}), updatedAt: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) };
    docs.unshift(copy);
    localStorage.setItem('nira_writer_docs', JSON.stringify(docs));
    loadDoc(copy.id);
    renderDocsList();
  }

  function renderDocsList() {
    const list = document.getElementById('docsList');
    if (docs.length === 0) {
      list.innerHTML = '<div class="docs-empty">No documents yet.<br>Click + to create one.</div>';
      return;
    }
    list.innerHTML = docs.map(d => `
      <div class="doc-item ${d.id === currentDocId ? 'active' : ''}" onclick="loadDoc(${d.id})">
        <div class="doc-item-title">${d.title || 'Untitled'}</div>
        <div class="doc-item-meta">${d.updatedAt} · ${(d.wordCount||0).toLocaleString()} words</div>
        <div class="doc-item-actions">
          <button class="doc-action-btn" onclick="event.stopPropagation();duplicateDoc(${d.id})">Duplicate</button>
          <button class="doc-action-btn danger" onclick="event.stopPropagation();deleteDoc(${d.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  // Title change
  document.getElementById('docTitle').addEventListener('input', function() {
    triggerAutoSave();
  });

  function exportTXT() {
    const title = document.getElementById('docTitle').value || 'document';
    const text = quill.getText();
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = title.replace(/[^a-z0-9]/gi,'-').toLowerCase() + '.txt'; a.click();
    URL.revokeObjectURL(url);
  }

  function exportPDF() {

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>

      body { font-family: 'Lora', Georgia, serif; font-size: 13pt; line-height: 1.85; color: #1a1a2e; max-width: 720px; margin: 2cm auto; padding: 0 1cm; }

      h2 { font-family: 'Playfair Display', serif; font-size: 18pt; }
      h3 { font-size: 14pt; font-weight: 600; }
      blockquote { border-left: 3px solid #60A5FA; padding-left: 14px; color: #6B7FA3; font-style: italic; }
      a { color: #2563EB; }
    </style></head><body><h1 style="text-align:center;margin-bottom:32px">${title}</h1>${content}

      <svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>

    <a class="mobile-nav-item" href="writer.html">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

</body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 500);
  }
</script>
